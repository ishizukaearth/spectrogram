<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Guitar Realtime Spectrogram v2a</title>
<style>
  :root{--bg:#101214;--panel:#1b1f24;--fg:#f2f4f6;--muted:#aeb6bf;--line:#3b424c;--green:#16a34a;--red:#dc2626;--orange:#f59e0b;--blue:#2563eb;}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;}
  header{padding:10px 12px;border-bottom:1px solid var(--line);background:#15181c;position:sticky;top:0;z-index:10}
  h1{font-size:18px;margin:0 0 8px 0}
  .buttons{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  button{border:0;border-radius:10px;color:white;font-weight:700;font-size:15px;padding:10px 14px;min-height:42px;box-shadow:0 1px 0 #0008;}
  .green{background:var(--green)} .red{background:var(--red)} .orange{background:var(--orange)} .blue{background:var(--blue)} .gray{background:#4b5563}
  main{display:grid;grid-template-columns:1fr;gap:8px;padding:8px;}
  #settingsPanel,#pitchPanel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px;}
  #settingsPanel.hidden,#pitchPanel.hidden{display:none}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}
  label{display:flex;flex-direction:column;gap:4px;font-size:13px;color:var(--muted)}
  input,select{width:100%;font-size:16px;border-radius:8px;border:1px solid var(--line);background:#0f1115;color:var(--fg);padding:8px}
  #wrap{position:relative;width:100%;height:calc(100vh - 140px);min-height:360px;background:#050607;border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  canvas{position:absolute;left:0;top:0;width:100%;height:100%;image-rendering:auto;}
  #status{font-size:13px;color:var(--muted);margin-left:auto;padding:6px 2px;}
  .noteTable{font-size:13px;line-height:1.6;color:var(--muted);columns:3;}
  @media(max-width:700px){#wrap{height:calc(100vh - 160px)} button{font-size:14px;padding:9px 10px}.noteTable{columns:2}}
</style>
</head>
<body>
<header>
  <h1>Guitar Realtime Spectrogram v2a</h1>
  <div class="buttons">
    <button id="micBtn" class="green">マイク開始</button>
    <button id="pauseBtn" class="orange">再開</button>
    <button id="settingsBtn" class="blue">パラメータ設定パネル：表示</button>
    <button id="pitchBtn" class="gray">ピッチパネル：隠す</button>
    <span id="status">停止中</span>
  </div>
</header>
<main>
  <section id="settingsPanel">
    <div class="grid">
      <label>FFTサイズ<select id="fftSize"><option>2048</option><option>4096</option><option selected>8192</option><option>16384</option><option>32768</option></select></label>
      <label>最小音<select id="minNote"></select></label>
      <label>最大音<select id="maxNote"></select></label>
      <label>A4基準周波数<input id="a4" type="number" step="0.1" value="440"></label>
      <label>マイクゲイン<input id="gain" type="number" step="0.1" value="1.0"></label>
      <label>上方cent余裕<input id="upperCent" type="number" step="1" value="10"></label>
      <label>赤丸しきい値(0-255)<input id="dotThreshold" type="number" step="1" value="145"></label>
      <label>時間幅(秒)<input id="seconds" type="number" step="1" value="8"></label>
    </div>
  </section>
  <section id="pitchPanel" class="hidden"><div id="pitchInfo" class="noteTable"></div></section>
  <div id="wrap"><canvas id="spec"></canvas><canvas id="overlay"></canvas></div>
</main>
<script>
'use strict';
const STORE='guitarSpectrogramV2aSettings';
const ids=['fftSize','minNote','maxNote','a4','gain','upperCent','dotThreshold','seconds'];
const el=Object.fromEntries(ids.map(id=>[id,document.getElementById(id)]));
const micBtn=document.getElementById('micBtn'), pauseBtn=document.getElementById('pauseBtn'), settingsBtn=document.getElementById('settingsBtn'), pitchBtn=document.getElementById('pitchBtn');
const settingsPanel=document.getElementById('settingsPanel'), pitchPanel=document.getElementById('pitchPanel'), statusEl=document.getElementById('status');
const spec=document.getElementById('spec'), overlay=document.getElementById('overlay'), sctx=spec.getContext('2d'), octx=overlay.getContext('2d');
let audioCtx, analyser, source, gainNode, data, running=false, paused=true, raf=0;
let frozenOverlay=null, noteList=[], x=0;
function noteFreq(m,a4=440){return a4*Math.pow(2,(m-69)/12)}
function noteName(m){const ns=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];return ns[m%12]+(Math.floor(m/12)-1)}
function fillNotes(){for(let m=28;m<=95;m++){let n=noteName(m); el.minNote.add(new Option(n,m)); el.maxNote.add(new Option(n,m));} el.minNote.value=40; el.maxNote.value=83;}
function loadSettings(){const saved=JSON.parse(localStorage.getItem(STORE)||'{}'); ids.forEach(id=>{if(saved[id]!==undefined) el[id].value=saved[id];});}
function saveSettings(){const obj={}; ids.forEach(id=>obj[id]=el[id].value); localStorage.setItem(STORE,JSON.stringify(obj));}
function resize(){const r=document.getElementById('wrap').getBoundingClientRect(); [spec,overlay].forEach(c=>{c.width=Math.floor(r.width*devicePixelRatio); c.height=Math.floor(r.height*devicePixelRatio);}); sctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0); octx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0); x=0; drawStableMarkers();}
function params(){return {fft:+el.fftSize.value,min:+el.minNote.value,max:+el.maxNote.value,a4:+el.a4.value,gain:+el.gain.value,upper:+el.upperCent.value,thr:+el.dotThreshold.value,sec:+el.seconds.value};}
function yForFreq(f,p){const lo=noteFreq(p.min,p.a4), hi=noteFreq(p.max,p.a4); return overlay.clientHeight-(Math.log(f/lo)/Math.log(hi/lo))*overlay.clientHeight;}
function drawStableMarkers(){const p=params(); octx.clearRect(0,0,overlay.clientWidth,overlay.clientHeight); octx.font='12px system-ui'; octx.textBaseline='middle'; octx.fillStyle='#d8dee8'; octx.strokeStyle='rgba(255,255,255,.16)'; noteList=[]; for(let m=p.min;m<=p.max;m++){let f=noteFreq(m,p.a4), y=yForFreq(f,p); noteList.push({m,n:noteName(m),f,y}); if(y>=0&&y<=overlay.clientHeight){octx.beginPath(); octx.moveTo(0,y); octx.lineTo(overlay.clientWidth,y); octx.stroke(); octx.fillText(noteName(m),4,y);}} updatePitchPanel();}
function updatePitchPanel(){document.getElementById('pitchInfo').innerHTML=noteList.map(n=>`${n.n}: ${n.f.toFixed(1)}Hz`).join('<br>');}
function binToY(i,p){const f=i*audioCtx.sampleRate/(2*data.length); return yForFreq(f,p)}
function intensityColor(v){let a=Math.max(0,Math.min(1,(v-20)/210)); let r=Math.floor(255*a), g=Math.floor(210*a*a), b=Math.floor(80*a*a*a); return `rgb(${r},${g},${b})`;}
function redrawOverlayDots(peaks){drawStableMarkers(); octx.fillStyle='rgba(255,60,60,.95)'; for(const pk of peaks){octx.beginPath(); octx.arc(pk.x,pk.y,3.6,0,Math.PI*2); octx.fill();}}
function draw(){if(!running) return; if(!paused){const p=params(); analyser.getByteFrequencyData(data); const w=spec.clientWidth,h=spec.clientHeight; const colW=Math.max(1,w/(p.sec*30)); sctx.drawImage(spec, colW,0,w-colW,h,0,0,w-colW,h); sctx.fillStyle='#050607'; sctx.fillRect(w-colW,0,colW,h); let peaks=[]; for(let i=1;i<data.length;i++){const v=Math.min(255,data[i]*p.gain); if(v<8) continue; const y=binToY(i,p); if(y<0||y>h) continue; sctx.fillStyle=intensityColor(v); sctx.fillRect(w-colW,y,colW,Math.max(1,h/400)); if(v>p.thr){const f=i*audioCtx.sampleRate/(2*data.length); for(const n of noteList){const upper=n.f*Math.pow(2,p.upper/1200); const lower=n.f*Math.pow(2,-4/1200); if(f>=lower && f<=upper){peaks.push({x:w-10,y:n.y}); break;}}}}
    redrawOverlayDots(peaks); frozenOverlay=octx.getImageData(0,0,overlay.width,overlay.height);
  } else if(frozenOverlay){octx.putImageData(frozenOverlay,0,0);}
  raf=requestAnimationFrame(draw);
}
async function startMic(){saveSettings(); audioCtx=new (window.AudioContext||window.webkitAudioContext)(); const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}}); source=audioCtx.createMediaStreamSource(stream); gainNode=audioCtx.createGain(); analyser=audioCtx.createAnalyser(); analyser.fftSize=+el.fftSize.value; analyser.smoothingTimeConstant=0; data=new Uint8Array(analyser.frequencyBinCount); gainNode.gain.value=1; source.connect(gainNode).connect(analyser); running=true; paused=false; micBtn.textContent='マイク終了'; micBtn.className='red'; pauseBtn.textContent='一時停止'; pauseBtn.className='orange'; settingsPanel.classList.add('hidden'); settingsBtn.textContent='パラメータ設定パネル：隠す'; statusEl.textContent='作動中'; drawStableMarkers(); draw();}
function stopMic(){running=false; paused=true; cancelAnimationFrame(raf); if(audioCtx) audioCtx.close(); micBtn.textContent='マイク開始'; micBtn.className='green'; pauseBtn.textContent='再開'; statusEl.textContent='停止中';}
micBtn.onclick=()=> running?stopMic():startMic().catch(e=>alert('マイクを開始できません: '+e.message));
pauseBtn.onclick=()=>{if(!running)return; paused=!paused; pauseBtn.textContent=paused?'再開':'一時停止'; statusEl.textContent=paused?'一時停止中':'作動中'; if(paused && frozenOverlay) octx.putImageData(frozenOverlay,0,0);};
settingsBtn.onclick=()=>{settingsPanel.classList.toggle('hidden'); settingsBtn.textContent='パラメータ設定パネル：'+(settingsPanel.classList.contains('hidden')?'隠す':'表示');};
pitchBtn.onclick=()=>{pitchPanel.classList.toggle('hidden'); pitchBtn.textContent='ピッチパネル：'+(pitchPanel.classList.contains('hidden')?'隠す':'表示');};
ids.forEach(id=>el[id].addEventListener('change',()=>{saveSettings(); if(running){stopMic();} drawStableMarkers();}));
fillNotes(); loadSettings(); resize(); addEventListener('resize',resize); drawStableMarkers();
</script>
</body>
</html>
