<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Guitar Raw Spectrogram v3g</title>
  <style>
    :root{--bg:#171717;--fg:#f2f2f2;--muted:#aaa;--accent:#67c56e;--warn:#e15b5b;--panel:#242424;--border:#3d4655;}
    body{margin:0;background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:14px;}
    .wrap{max-width:760px;margin:0 auto;padding:14px 10px 18px;}
    h1{font-size:18px;line-height:1.35;margin:4px 0 10px;}
    .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:8px 0;}
    button,select,input{font-size:14px;border-radius:7px;border:1px solid #555;background:#222;color:var(--fg);padding:7px 9px;}
    button{font-weight:700;border:0;}
    .start{background:var(--accent);color:#08240b}.pause{background:#d29b37;color:#201200}.stop{background:var(--warn);color:#fff}.small{font-size:12px;padding:5px 7px}
    label{display:inline-flex;gap:5px;align-items:center;color:#ddd;}
    input[type=range]{width:140px;padding:0} input[type=number]{width:72px;}
    .hint{color:var(--muted);font-size:12px;line-height:1.45;margin:6px 0;}
    .status{font-size:12px;color:#ddd;margin-top:6px;min-height:1.4em;}
    .canvasBox{position:relative;border-top:1px solid #333;border-bottom:1px solid #333;background:#000;overflow:hidden;touch-action:none;}
    canvas{display:block;width:100%;height:560px;background:#000;}
    #settingsPanel.hidden{display:none;}
    .settingsPanel{border:1px solid var(--border);border-radius:12px;padding:8px;margin:8px 0;background:#1d222b;}
    .readout{background:var(--panel);border-radius:8px;padding:6px 8px;margin:6px 0;font-size:12px;color:#eee;white-space:pre-wrap;}
    .hidden{display:none;}
  </style>
</head>
<body>
<div class="wrap">
  <h1>Guitar Raw Spectrogram v3g</h1>

  <div class="controls">
    <button id="startBtn" class="start">マイク開始</button>
    <button id="pauseBtn" class="pause" disabled>一時停止</button>
    <button id="settingsBtn" class="small">設定を表示</button>
    <button id="stopBtn" class="stop" disabled>終了</button>
    <label>FFT
      <select id="fftSize">
        <option>256</option><option>512</option><option selected>1024</option><option>2048</option><option>4096</option><option>8192</option><option>16384</option><option>32768</option>
      </select>
    </label>
  </div>

  <div id="settingsPanel" class="settingsPanel hidden">
    <div class="controls">
      <label>表示音域
        <select id="rangePreset">
          <option value="E2:E5">E2〜E5（ギター基音）</option>
          <option value="E2:B6" selected>E2〜B6（広域）</option>
          <option value="E2:D4">E2〜D4（低音）</option>
          <option value="B3:B6">B3〜B6（高音）</option>
          <option value="custom">任意指定</option>
        </select>
      </label>
      <span id="customRange" class="hidden">
        <label>下限 <input id="minNote" value="E2" /></label>
        <label>上限 <input id="maxNote" value="B6" /></label>
        <button id="applyRange" class="small">適用</button>
      </span>
    </div>

    <div class="controls">
      <label>A4基準 <input id="a4Hz" type="number" step="0.1" value="440.0"> Hz</label>
    </div>

    <div class="controls">
      <label>マイク増幅 <input id="micGain" type="range" min="1" max="100" step="1" value="5"><span id="micGainVal">5.0x</span></label>
      <label>表示感度 <input id="displayGain" type="range" min="0" max="80" step="1" value="28"><span id="displayGainVal">+28dB</span></label>
      <label>黒レベル <input id="blackLevel" type="range" min="-120" max="-40" step="1" value="-95"><span id="blackVal">-95dB</span></label>
      <label>白レベル <input id="whiteLevel" type="range" min="-90" max="0" step="1" value="-35"><span id="whiteVal">-35dB</span></label>
    </div>

    <div id="readout" class="readout">未開始</div>
  </div>

  <div class="hint">v3gは純粋なFFTスペクトログラムです。横方向＝時間、縦方向＝周波数を音程目盛に換算。表示は白黒階調で、黒＝弱い、白＝強い成分です。音名は目盛りだけに表示します。</div>

  <div class="canvasBox">
    <canvas id="spec" width="720" height="560"></canvas>
  </div>
  <div id="status" class="status">停止中です</div>
</div>

<script>
'use strict';

const canvas = document.getElementById('spec');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const pauseBtn = document.getElementById('pauseBtn');
const settingsBtn = document.getElementById('settingsBtn');
const settingsPanel = document.getElementById('settingsPanel');
const stopBtn = document.getElementById('stopBtn');
const fftSel = document.getElementById('fftSize');
const rangePreset = document.getElementById('rangePreset');
const customRange = document.getElementById('customRange');
const minNoteEl = document.getElementById('minNote');
const maxNoteEl = document.getElementById('maxNote');
const applyRange = document.getElementById('applyRange');
const a4HzEl = document.getElementById('a4Hz');
const micGainEl = document.getElementById('micGain');
const displayGainEl = document.getElementById('displayGain');
const blackLevelEl = document.getElementById('blackLevel');
const whiteLevelEl = document.getElementById('whiteLevel');
const micGainVal = document.getElementById('micGainVal');
const displayGainVal = document.getElementById('displayGainVal');
const blackVal = document.getElementById('blackVal');
const whiteVal = document.getElementById('whiteVal');
const readout = document.getElementById('readout');
const statusEl = document.getElementById('status');

let audioCtx, analyser, source, gainNode, stream;
let freqData;
let rafId = null;
let running = false;
let paused = false;
let minMidi = 40; // E2
let maxMidi = 95; // B6
let lastDraw = 0;

const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
function noteNameToMidi(s){
  const m = String(s).trim().toUpperCase().match(/^([A-G])(#|B)?(-?\d+)$/);
  if(!m) return null;
  let name = m[1] + (m[2] || '');
  name = name.replace('CB','B').replace('DB','C#').replace('EB','D#').replace('FB','E').replace('GB','F#').replace('AB','G#').replace('BB','A#');
  const idx = NOTE_NAMES.indexOf(name);
  if(idx < 0) return null;
  return (parseInt(m[3],10)+1)*12 + idx;
}
function midiToName(n){return NOTE_NAMES[((n%12)+12)%12] + (Math.floor(n/12)-1);}
function midiToFreq(m){return Number(a4HzEl.value || 440) * Math.pow(2, (m-69)/12);}
function freqToMidi(f){return 69 + 12*Math.log2(f/Number(a4HzEl.value || 440));}

function resizeCanvas(){
  const rect = canvas.getBoundingClientRect();
  canvas.width = Math.max(320, Math.round(rect.width));
  canvas.height = Math.max(420, Math.round(rect.height));
  ctx.setTransform(1,0,0,1,0,0);
  clearCanvas();
}
function W(){return canvas.width;}
function H(){return canvas.height;}
function yForMidi(m){
  const top = 8, bottom = H()-10;
  return bottom - (m - minMidi) / (maxMidi - minMidi) * (bottom - top);
}
function yForFreq(f){return yForMidi(freqToMidi(f));}

function clearCanvas(){
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,W(),H());
  drawGrid();
}
function drawGrid(){
  const w=W();
  ctx.save();
  ctx.font='12px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif';
  ctx.textBaseline='middle';
  for(let m=Math.ceil(minMidi); m<=Math.floor(maxMidi); m++){
    const y = yForMidi(m);
    const name = midiToName(m);
    const isNatural = !name.includes('#');
    ctx.strokeStyle = isNatural ? 'rgba(80,105,255,0.75)' : 'rgba(70,70,130,0.42)';
    ctx.lineWidth = isNatural ? 1 : 0.5;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke();
    if(isNatural || (maxMidi-minMidi)<=28){
      ctx.fillStyle = '#e9e9e9';
      ctx.fillText(name, 3, y);
      if(w>330) ctx.fillText(name, w-34, y);
    }
  }
  ctx.restore();
}
function grayForDb(db){
  const black = Number(blackLevelEl.value || -95);
  const white = Number(whiteLevelEl.value || -35);
  let v = (db - black) / Math.max(1, (white - black));
  v = Math.max(0, Math.min(1, v));
  const g = Math.round(v*255);
  return `rgb(${g},${g},${g})`;
}
function drawRawColumn(){
  const w=W(), h=H();
  const img = ctx.getImageData(1,0,Math.max(1,w-1),h);
  ctx.putImageData(img,0,0);
  ctx.fillStyle='#000'; ctx.fillRect(w-1,0,1,h);

  const sr = audioCtx.sampleRate;
  const binHz = sr / analyser.fftSize;
  const displayGain = Number(displayGainEl.value || 0);
  const fMin = midiToFreq(minMidi);
  const fMax = midiToFreq(maxMidi);

  for(let i=1; i<freqData.length; i++){
    const f0 = Math.max(1, (i-0.5) * binHz);
    const f1 = (i+0.5) * binHz;
    const fc = i * binHz;
    if(f1 < fMin || f0 > fMax) continue;
    const y0 = yForFreq(Math.min(f1, fMax));
    const y1 = yForFreq(Math.max(f0, fMin));
    if(!isFinite(y0) || !isFinite(y1)) continue;
    const yTop = Math.min(y0,y1);
    const yBot = Math.max(y0,y1);
    const db = freqData[i] + displayGain;
    if(db <= Number(blackLevelEl.value || -95)) continue;
    ctx.fillStyle = grayForDb(db);
    ctx.fillRect(w-2, Math.floor(yTop), 2, Math.max(1, Math.ceil(yBot-yTop)));
  }
  if(Math.random()<0.08) drawGrid();
}
function updateReadout(){
  if(!analyser || !freqData){ readout.textContent='未開始'; return; }
  const sr = audioCtx.sampleRate;
  const binHz = sr / analyser.fftSize;
  const displayGain = Number(displayGainEl.value || 0);
  const fMin = midiToFreq(minMidi), fMax = midiToFreq(maxMidi);
  const peaks = [];
  for(let i=1;i<freqData.length-1;i++){
    const f = i*binHz;
    if(f<fMin || f>fMax) continue;
    const db = freqData[i] + displayGain;
    if(db > freqData[i-1]+displayGain && db >= freqData[i+1]+displayGain){
      peaks.push({f, db, midi: freqToMidi(f)});
    }
  }
  peaks.sort((a,b)=>b.db-a.db);
  const lines = peaks.slice(0,5).map(p => `${midiToName(Math.round(p.midi))}付近  ${p.f.toFixed(1)}Hz  ${p.db.toFixed(1)}dB`).join('\n');
  readout.textContent = `基準 A4=${Number(a4HzEl.value).toFixed(1)}Hz / 表示 ${midiToName(minMidi)}〜${midiToName(maxMidi)} / FFT ${analyser.fftSize}\nFFT分解能: ${binHz.toFixed(1)}Hz/bin\n強い成分（上位5個）:\n${lines || '-'}`;
}
function updateRange(){
  let lo='E2', hi='B6';
  if(rangePreset.value === 'custom'){
    customRange.classList.remove('hidden');
    lo=minNoteEl.value; hi=maxNoteEl.value;
  }else{
    customRange.classList.add('hidden');
    [lo,hi]=rangePreset.value.split(':');
    minNoteEl.value=lo; maxNoteEl.value=hi;
  }
  const a=noteNameToMidi(lo), b=noteNameToMidi(hi);
  if(a!==null && b!==null && b>a){minMidi=a; maxMidi=b; clearCanvas(); updateReadout();}
}
function loop(ts){
  if(!running) return;
  rafId = requestAnimationFrame(loop);
  if(paused) return;
  if(ts - lastDraw < 30) return;
  lastDraw = ts;
  analyser.getFloatFrequencyData(freqData);
  drawRawColumn();
  updateReadout();
}
async function startMic(){
  if(running) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  stream = await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false, noiseSuppression:false, autoGainControl:false}, video:false});
  source = audioCtx.createMediaStreamSource(stream);
  gainNode = audioCtx.createGain();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = Number(fftSel.value);
  analyser.smoothingTimeConstant = 0.04;
  analyser.minDecibels = -120;
  analyser.maxDecibels = -10;
  gainNode.gain.value = Number(micGainEl.value);
  source.connect(gainNode); gainNode.connect(analyser);
  freqData = new Float32Array(analyser.frequencyBinCount);
  running = true; paused = false; clearCanvas();
  startBtn.disabled=true; pauseBtn.disabled=false; stopBtn.disabled=false; pauseBtn.textContent='一時停止';
  statusEl.textContent='録音・解析中です';
  rafId = requestAnimationFrame(loop);
}
function pauseResume(){
  if(!running) return;
  paused = !paused;
  pauseBtn.textContent = paused ? '再開' : '一時停止';
  statusEl.textContent = paused ? '一時停止中です。画面は固定、マイクは保持しています。' : '録音・解析中です';
}
function stopMic(){
  running=false; paused=false;
  if(rafId) cancelAnimationFrame(rafId);
  if(stream){ stream.getTracks().forEach(t=>t.stop()); }
  if(audioCtx){ audioCtx.close(); }
  startBtn.disabled=false; pauseBtn.disabled=true; stopBtn.disabled=true; pauseBtn.textContent='一時停止';
  statusEl.textContent='停止しました';
}

startBtn.addEventListener('click', () => startMic().catch(e => {statusEl.textContent='マイク開始エラー: '+e.message;}));
pauseBtn.addEventListener('click', pauseResume);
settingsBtn.addEventListener('click', () => {
  const hidden = settingsPanel.classList.toggle('hidden');
  settingsBtn.textContent = hidden ? '設定を表示' : '設定を隠す';
});
stopBtn.addEventListener('click', stopMic);
fftSel.addEventListener('change', () => { if(analyser){ analyser.fftSize=Number(fftSel.value); freqData=new Float32Array(analyser.frequencyBinCount); clearCanvas(); updateReadout(); }});
rangePreset.addEventListener('change', updateRange);
applyRange.addEventListener('click', updateRange);
a4HzEl.addEventListener('change', () => { clearCanvas(); updateReadout(); });
micGainEl.addEventListener('input', () => { micGainVal.textContent=Number(micGainEl.value).toFixed(1)+'x'; if(gainNode) gainNode.gain.value=Number(micGainEl.value); });
displayGainEl.addEventListener('input', () => { displayGainVal.textContent='+'+displayGainEl.value+'dB'; });
blackLevelEl.addEventListener('input', () => { blackVal.textContent=blackLevelEl.value+'dB'; });
whiteLevelEl.addEventListener('input', () => { whiteVal.textContent=whiteLevelEl.value+'dB'; });
window.addEventListener('resize', resizeCanvas);
resizeCanvas(); updateRange();
</script>
</body>
</html>
