<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Guitar Pitch Energy Spectrogram v3</title>
<style>
  :root{--bg:#0f1115;--panel:#1b2028;--fg:#f5f7fb;--muted:#aab3c0;--line:#3b4350;--green:#16a34a;--red:#dc2626;--orange:#f59e0b;--blue:#2563eb;}
  *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
  header{padding:10px 12px;border-bottom:1px solid var(--line);background:#151922;position:sticky;top:0;z-index:10}h1{font-size:18px;margin:0 0 8px}
  .buttons{display:flex;gap:8px;flex-wrap:wrap;align-items:center}button{border:0;border-radius:10px;color:#fff;font-weight:700;font-size:15px;padding:10px 14px;min-height:42px}.green{background:var(--green)}.red{background:var(--red)}.orange{background:var(--orange)}.blue{background:var(--blue)}.gray{background:#4b5563}
  #status{font-size:13px;color:var(--muted);margin-left:auto}.hidden{display:none!important}
  main{padding:8px;display:grid;gap:8px}#settingsPanel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}label{display:flex;flex-direction:column;gap:4px;color:var(--muted);font-size:13px}input,select{font-size:16px;border:1px solid var(--line);border-radius:8px;background:#0c0f14;color:var(--fg);padding:8px}
  #wrap{position:relative;width:100%;height:calc(100vh - 135px);min-height:380px;background:#030405;border:1px solid var(--line);border-radius:12px;overflow:hidden}canvas{position:absolute;left:0;top:0;width:100%;height:100%}
  .hint{font-size:13px;color:var(--muted)}
</style>
</head>
<body>
<header><h1>Guitar Pitch Energy Spectrogram v3</h1><div class="buttons"><button id="micBtn" class="green">マイク開始</button><button id="pauseBtn" class="orange">再開</button><button id="settingsBtn" class="blue">パラメータ設定パネル：表示</button><span id="status">停止中</span></div></header>
<main>
<section id="settingsPanel"><div class="grid">
<label>FFTサイズ<select id="fftSize"><option>4096</option><option selected>8192</option><option>16384</option><option>32768</option></select></label>
<label>最小音<select id="minNote"></select></label><label>最大音<select id="maxNote"></select></label>
<label>A4基準周波数<input id="a4" type="number" step="0.1" value="440"></label>
<label>合算ピッチ幅 ±cent<input id="centWidth" type="number" step="1" value="10"></label>
<label>時間幅(秒)<input id="seconds" type="number" step="1" value="8"></label>
<label>線の強調倍率<input id="lineGain" type="number" step="0.2" value="1.4"></label>
<label>オンセットしきい値<input id="onsetThreshold" type="number" step="0.01" value="0.18"></label>
</div><p class="hint">背景は周波数ごとの強度スペクトログラム、白線は各代表ピッチ±cent幅の合算エネルギー時系列、縦線は急な立ち上がり候補です。</p></section>
<div id="wrap"><canvas id="spec"></canvas><canvas id="overlay"></canvas></div>
</main>
<script>
'use strict';
const STORE='guitarPitchEnergyV3Settings'; const ids=['fftSize','minNote','maxNote','a4','centWidth','seconds','lineGain','onsetThreshold'];
const el=Object.fromEntries(ids.map(id=>[id,document.getElementById(id)])); const micBtn=document.getElementById('micBtn'), pauseBtn=document.getElementById('pauseBtn'), settingsBtn=document.getElementById('settingsBtn'), statusEl=document.getElementById('status');
const panel=document.getElementById('settingsPanel'), spec=document.getElementById('spec'), overlay=document.getElementById('overlay'), sctx=spec.getContext('2d'), octx=overlay.getContext('2d');
let audioCtx, analyser, source, data, running=false, paused=true, raf=0, notes=[], prevTotal=0, frozen=null;
function noteFreq(m,a4=440){return a4*Math.pow(2,(m-69)/12)} function noteName(m){const ns=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];return ns[m%12]+(Math.floor(m/12)-1)}
function fillNotes(){for(let m=28;m<=95;m++){el.minNote.add(new Option(noteName(m),m));el.maxNote.add(new Option(noteName(m),m));}el.minNote.value=40;el.maxNote.value=83;}
function load(){const s=JSON.parse(localStorage.getItem(STORE)||'{}'); ids.forEach(id=>{if(s[id]!==undefined)el[id].value=s[id];});} function save(){const s={};ids.forEach(id=>s[id]=el[id].value);localStorage.setItem(STORE,JSON.stringify(s));}
function p(){return{fft:+el.fftSize.value,min:+el.minNote.value,max:+el.maxNote.value,a4:+el.a4.value,cent:+el.centWidth.value,sec:+el.seconds.value,lineGain:+el.lineGain.value,onset:+el.onsetThreshold.value}}
function resize(){const r=document.getElementById('wrap').getBoundingClientRect();[spec,overlay].forEach(c=>{c.width=Math.floor(r.width*devicePixelRatio);c.height=Math.floor(r.height*devicePixelRatio);});sctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);octx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);drawBaseOverlay();}
function yForFreq(f,pp){const lo=noteFreq(pp.min,pp.a4),hi=noteFreq(pp.max,pp.a4);return overlay.clientHeight-(Math.log(f/lo)/Math.log(hi/lo))*overlay.clientHeight;}
function buildNotes(){const pp=p(); notes=[]; for(let m=pp.min;m<=pp.max;m++){const f=noteFreq(m,pp.a4); notes.push({m,n:noteName(m),f,y:yForFreq(f,pp),energy:0,lastY:yForFreq(f,pp)});} }
function drawBaseOverlay(){buildNotes(); const w=overlay.clientWidth,h=overlay.clientHeight; octx.clearRect(0,0,w,h); octx.font='12px system-ui'; octx.textBaseline='middle'; octx.strokeStyle='rgba(255,255,255,.14)'; octx.fillStyle='#e8edf5'; for(const n of notes){if(n.y>=0&&n.y<=h){octx.beginPath();octx.moveTo(0,n.y);octx.lineTo(w,n.y);octx.stroke();octx.fillText(n.n,4,n.y);}}}
function color(v){let a=Math.max(0,Math.min(1,(v-15)/210));let r=Math.floor(240*a),g=Math.floor(220*a*a),b=Math.floor(120*a*a*a);return`rgb(${r},${g},${b})`;}
function drawFrame(){if(!running)return; if(!paused){const pp=p(),w=spec.clientWidth,h=spec.clientHeight,colW=Math.max(1,w/(pp.sec*30)); analyser.getByteFrequencyData(data); sctx.drawImage(spec,colW,0,w-colW,h,0,0,w-colW,h); sctx.fillStyle='#030405'; sctx.fillRect(w-colW,0,colW,h); octx.drawImage(overlay,colW,0,w-colW,h,0,0,w-colW,h); octx.clearRect(w-colW,0,colW,h);
    let total=0; for(let i=1;i<data.length;i++){const v=data[i]; if(v<5)continue; const f=i*audioCtx.sampleRate/(2*data.length), y=yForFreq(f,pp); if(y<0||y>h)continue; sctx.fillStyle=color(v); sctx.fillRect(w-colW,y,colW,Math.max(1,h/500)); total+=v/255;}
    for(const n of notes){let e=0,count=0; const lo=n.f*Math.pow(2,-pp.cent/1200), hi=n.f*Math.pow(2,pp.cent/1200); const binLo=Math.max(1,Math.floor(lo/(audioCtx.sampleRate/2)*data.length)); const binHi=Math.min(data.length-1,Math.ceil(hi/(audioCtx.sampleRate/2)*data.length)); for(let b=binLo;b<=binHi;b++){e+=data[b];count++;} e=count?e/count/255:0; const amp=Math.min(24,e*22*pp.lineGain); const y=n.y-amp; octx.strokeStyle='rgba(255,255,255,.78)'; octx.lineWidth=1.4; octx.beginPath(); octx.moveTo(w-colW,n.lastY); octx.lineTo(w,y); octx.stroke(); n.lastY=y; if(e>.45){octx.fillStyle='rgba(255,80,80,.85)';octx.beginPath();octx.arc(w-4,y,2.6,0,Math.PI*2);octx.fill();}}
    const rise=total-prevTotal; if(rise>pp.onset){octx.strokeStyle='rgba(100,180,255,.9)';octx.lineWidth=2;octx.beginPath();octx.moveTo(w-3,0);octx.lineTo(w-3,h);octx.stroke();} prevTotal=total; frozen=octx.getImageData(0,0,overlay.width,overlay.height);
  } else if(frozen){octx.putImageData(frozen,0,0);} raf=requestAnimationFrame(drawFrame);}
async function start(){save(); audioCtx=new(window.AudioContext||window.webkitAudioContext)(); const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}}); source=audioCtx.createMediaStreamSource(stream); analyser=audioCtx.createAnalyser(); analyser.fftSize=+el.fftSize.value; analyser.smoothingTimeConstant=0; data=new Uint8Array(analyser.frequencyBinCount); source.connect(analyser); buildNotes(); running=true; paused=false; micBtn.textContent='マイク終了';micBtn.className='red';pauseBtn.textContent='一時停止';panel.classList.add('hidden');settingsBtn.textContent='パラメータ設定パネル：隠す';statusEl.textContent='作動中';prevTotal=0;drawFrame();}
function stop(){running=false;paused=true;cancelAnimationFrame(raf);if(audioCtx)audioCtx.close();micBtn.textContent='マイク開始';micBtn.className='green';pauseBtn.textContent='再開';statusEl.textContent='停止中';}
micBtn.onclick=()=>running?stop():start().catch(e=>alert('マイクを開始できません: '+e.message)); pauseBtn.onclick=()=>{if(!running)return;paused=!paused;pauseBtn.textContent=paused?'再開':'一時停止';statusEl.textContent=paused?'一時停止中':'作動中';}; settingsBtn.onclick=()=>{panel.classList.toggle('hidden');settingsBtn.textContent='パラメータ設定パネル：'+(panel.classList.contains('hidden')?'隠す':'表示');}; ids.forEach(id=>el[id].addEventListener('change',()=>{save(); if(running)stop(); drawBaseOverlay();}));
fillNotes();load();resize();addEventListener('resize',resize);drawBaseOverlay();
</script>
</body>
</html>
