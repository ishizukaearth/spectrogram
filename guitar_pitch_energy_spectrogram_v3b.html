<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Guitar Raw Spectrogram v3b</title>
<style>
  :root{--bg:#0f1115;--panel:#1b2028;--fg:#f5f7fb;--muted:#aab3c0;--line:#3b4350;--green:#16a34a;--red:#dc2626;--orange:#f59e0b;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;overflow:hidden}
  header{padding:10px 12px;border-bottom:1px solid var(--line);background:#151922;position:sticky;top:0;z-index:10}
  h1{font-size:18px;margin:0 0 8px}.buttons{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  button{border:0;border-radius:10px;color:#fff;font-weight:700;font-size:15px;padding:10px 14px;min-height:42px}.green{background:var(--green)}.red{background:var(--red)}.orange{background:var(--orange)}
  #status{font-size:13px;color:var(--muted);margin-left:auto}.hidden{display:none!important}
  main{height:calc(100vh - 74px);display:flex;flex-direction:column;padding:8px;gap:8px;overflow:hidden}
  #settingsPanel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px;flex:0 0 auto}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px}
  label{display:flex;flex-direction:column;gap:4px;color:var(--muted);font-size:13px}input,select{font-size:16px;border:1px solid var(--line);border-radius:8px;background:#0c0f14;color:var(--fg);padding:8px}
  .hint{font-size:13px;color:var(--muted);margin:8px 0 0}
  #wrap{position:relative;width:100%;flex:1 1 auto;min-height:250px;background:#030405;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  canvas{position:absolute;top:0;height:100%}
  #axis{left:0;width:58px;background:#07090d;z-index:3;border-right:1px solid rgba(255,255,255,.18)}
  #spec{left:58px;right:0;width:calc(100% - 58px);z-index:1}
  #overlay{left:58px;right:0;width:calc(100% - 58px);z-index:2;pointer-events:none}
</style>
</head>
<body>
<header>
  <h1>Guitar Raw Spectrogram v3b</h1>
  <div class="buttons">
    <button id="micBtn" class="green">マイク開始</button>
    <button id="pauseBtn" class="orange">再開</button>
    <span id="status">停止中</span>
  </div>
</header>
<main>
<section id="settingsPanel">
  <div class="grid">
    <label>FFTサイズ<select id="fftSize"><option>1024</option><option selected>2048</option><option>4096</option><option>8192</option><option>16384</option><option>32768</option></select></label>
    <label>最小音<select id="minNote"></select></label>
    <label>最大音<select id="maxNote"></select></label>
    <label>A4基準周波数<input id="a4" type="number" step="0.1" value="440"></label>
    <label>時間幅(秒)<input id="seconds" type="number" step="1" value="8"></label>
    <label>表示ゲイン<input id="gain" type="number" step="0.1" value="1.8"></label>
    <label>黒レベル<input id="black" type="number" step="1" value="8"></label>
    <label>オンセットしきい値<input id="onsetThreshold" type="number" step="0.01" value="0.16"></label>
    <label>ピッチ合算幅 ±cent<input id="centWidth" type="number" step="1" value="10"></label>
    <label>ピッチ線表示<select id="pitchLine"><option value="on" selected>表示</option><option value="off">非表示</option></select></label>
  </div>
  <p class="hint">v3bは、まずリアルタイムに流れる原始スペクトログラムを見るための版です。録音中はこの設定パネルを自動で閉じます。</p>
</section>
<div id="wrap"><canvas id="axis"></canvas><canvas id="spec"></canvas><canvas id="overlay"></canvas></div>
</main>
<script>
'use strict';
const STORE='guitarRawSpectrogramV3b';
const ids=['fftSize','minNote','maxNote','a4','seconds','gain','black','onsetThreshold','centWidth','pitchLine'];
const el=Object.fromEntries(ids.map(id=>[id,document.getElementById(id)]));
const micBtn=document.getElementById('micBtn'), pauseBtn=document.getElementById('pauseBtn'), statusEl=document.getElementById('status'), panel=document.getElementById('settingsPanel');
const axis=document.getElementById('axis'), spec=document.getElementById('spec'), overlay=document.getElementById('overlay');
const actx=axis.getContext('2d'), sctx=spec.getContext('2d'), octx=overlay.getContext('2d');
let audioCtx=null, analyser=null, source=null, stream=null, data=null;
let running=false, paused=true, raf=0, notes=[], prevTotal=0;
function noteFreq(m,a4=440){return a4*Math.pow(2,(m-69)/12)}
function noteName(m){const ns=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];return ns[m%12]+(Math.floor(m/12)-1)}
function fillNotes(){for(let m=28;m<=95;m++){el.minNote.add(new Option(noteName(m),m));el.maxNote.add(new Option(noteName(m),m));}el.minNote.value=40;el.maxNote.value=83;}
function load(){try{const s=JSON.parse(localStorage.getItem(STORE)||'{}');ids.forEach(id=>{if(s[id]!==undefined)el[id].value=s[id];});}catch(e){}}
function save(){const s={};ids.forEach(id=>s[id]=el[id].value);localStorage.setItem(STORE,JSON.stringify(s));}
function prm(){return{fft:+el.fftSize.value,min:+el.minNote.value,max:+el.maxNote.value,a4:+el.a4.value,sec:+el.seconds.value,gain:+el.gain.value,black:+el.black.value,onset:+el.onsetThreshold.value,cent:+el.centWidth.value,pitchLine:el.pitchLine.value==='on'}}
function yForFreq(f,pp,h=spec.clientHeight){const lo=noteFreq(pp.min,pp.a4),hi=noteFreq(pp.max,pp.a4);return h-(Math.log(f/lo)/Math.log(hi/lo))*h;}
function buildNotes(){const pp=prm();notes=[];for(let m=pp.min;m<=pp.max;m++){const f=noteFreq(m,pp.a4);notes.push({m,n:noteName(m),f,y:yForFreq(f,pp),lastY:yForFreq(f,pp)});}}
function resize(){const wrap=document.getElementById('wrap');const r=wrap.getBoundingClientRect();const d=devicePixelRatio||1;axis.width=Math.max(1,Math.floor(58*d));axis.height=Math.max(1,Math.floor(r.height*d));spec.width=Math.max(1,Math.floor((r.width-58)*d));spec.height=Math.max(1,Math.floor(r.height*d));overlay.width=spec.width;overlay.height=spec.height;[actx,sctx,octx].forEach(c=>c.setTransform(d,0,0,d,0,0));clearCanvases();drawAxis();}
function clearCanvases(){sctx.fillStyle='#030405';sctx.fillRect(0,0,spec.clientWidth,spec.clientHeight);octx.clearRect(0,0,overlay.clientWidth,overlay.clientHeight);}
function drawAxis(){buildNotes();const h=axis.clientHeight,w=axis.clientWidth;actx.clearRect(0,0,w,h);actx.fillStyle='#07090d';actx.fillRect(0,0,w,h);actx.font='12px system-ui';actx.textBaseline='middle';actx.textAlign='right';for(const n of notes){if(n.y<0||n.y>h)continue;actx.strokeStyle=(n.n[1]==='#')?'rgba(255,255,255,.08)':'rgba(255,255,255,.18)';actx.beginPath();actx.moveTo(w-8,n.y);actx.lineTo(w,n.y);actx.stroke();if(!n.n.includes('#')){actx.fillStyle='#e8edf5';actx.fillText(n.n,w-11,n.y);}}}
function colorFromValue(v,pp){let x=Math.max(0,Math.min(1,(v-pp.black)/Math.max(1,255-pp.black)*pp.gain));let r=Math.floor(255*Math.pow(x,0.75)),g=Math.floor(210*Math.pow(x,1.35)),b=Math.floor(90*Math.pow(x,2.2));return `rgb(${r},${g},${b})`;}
function drawGridColumn(x0,x1){const h=overlay.clientHeight;octx.strokeStyle='rgba(255,255,255,.10)';octx.lineWidth=1;for(const n of notes){if(n.y<0||n.y>h)continue;if(!n.n.includes('#')){octx.beginPath();octx.moveTo(x0,n.y);octx.lineTo(x1,n.y);octx.stroke();}}}
function frame(){if(!running)return;if(!paused){const pp=prm();const w=spec.clientWidth,h=spec.clientHeight;const colW=Math.max(1,w/(pp.sec*30));analyser.getByteFrequencyData(data);
  // scroll left
  sctx.drawImage(spec,colW,0,w-colW,h,0,0,w-colW,h);sctx.fillStyle='#030405';sctx.fillRect(w-colW,0,colW,h);
  octx.drawImage(overlay,colW,0,w-colW,h,0,0,w-colW,h);octx.clearRect(w-colW,0,colW,h);drawGridColumn(w-colW,w);
  // raw spectrogram column
  let total=0; const hzPerBin=audioCtx.sampleRate/(2*data.length); const ppMinF=noteFreq(pp.min,pp.a4), ppMaxF=noteFreq(pp.max,pp.a4);
  for(let i=1;i<data.length;i++){const v=data[i]; if(v<=0)continue; const f=i*hzPerBin; if(f<ppMinF||f>ppMaxF)continue; const y=yForFreq(f,pp,h); const f2=(i+1)*hzPerBin; const y2=yForFreq(f2,pp,h); const yy=Math.min(y,y2), hh=Math.max(1,Math.abs(y2-y)+1); sctx.fillStyle=colorFromValue(v,pp); sctx.fillRect(w-colW,yy,colW,hh); total += Math.max(0,v-pp.black)/255;}
  // pitch-band energy trace, optional
  if(pp.pitchLine){for(const n of notes){const lo=n.f*Math.pow(2,-pp.cent/1200), hi=n.f*Math.pow(2,pp.cent/1200);const b0=Math.max(1,Math.floor(lo/hzPerBin)), b1=Math.min(data.length-1,Math.ceil(hi/hzPerBin));let e=0,c=0;for(let b=b0;b<=b1;b++){e+=Math.max(0,data[b]-pp.black);c++;}e=c?e/c/255:0;const y=n.y-Math.min(18,e*22);octx.strokeStyle='rgba(255,255,255,.75)';octx.lineWidth=1.2;octx.beginPath();octx.moveTo(w-colW,n.lastY);octx.lineTo(w,y);octx.stroke();n.lastY=y;}}
  const rise=total-prevTotal;if(rise>pp.onset*20){octx.strokeStyle='rgba(90,180,255,.95)';octx.lineWidth=2;octx.beginPath();octx.moveTo(w-3,0);octx.lineTo(w-3,h);octx.stroke();}prevTotal=total;
}raf=requestAnimationFrame(frame)}
async function start(){save();clearCanvases();drawAxis();audioCtx=new(window.AudioContext||window.webkitAudioContext)();stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});source=audioCtx.createMediaStreamSource(stream);analyser=audioCtx.createAnalyser();analyser.fftSize=+el.fftSize.value;analyser.smoothingTimeConstant=0;data=new Uint8Array(analyser.frequencyBinCount);source.connect(analyser);buildNotes();prevTotal=0;running=true;paused=false;micBtn.textContent='マイク終了';micBtn.className='red';pauseBtn.textContent='一時停止';panel.classList.add('hidden');statusEl.textContent='作動中';frame();}
function stop(){running=false;paused=true;cancelAnimationFrame(raf);if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}if(audioCtx){audioCtx.close();audioCtx=null;}micBtn.textContent='マイク開始';micBtn.className='green';pauseBtn.textContent='再開';panel.classList.remove('hidden');statusEl.textContent='停止中';}
micBtn.onclick=()=>running?stop():start().catch(e=>{stop();alert('マイクを開始できません: '+e.message)});
pauseBtn.onclick=()=>{if(!running)return;paused=!paused;pauseBtn.textContent=paused?'再開':'一時停止';statusEl.textContent=paused?'一時停止中':'作動中';if(paused){panel.classList.remove('hidden')}else{save();panel.classList.add('hidden');drawAxis();}};
ids.forEach(id=>el[id].addEventListener('change',()=>{save();drawAxis();if(!running)clearCanvases();}));
fillNotes();load();resize();addEventListener('resize',resize);
</script>
</body>
</html>
