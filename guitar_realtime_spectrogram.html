<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>ギター撥音観察用リアルタイム・スペクトログラム</title>
<style>
body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:#111;color:#eee}
header{padding:10px 12px;background:#1d1d1d;position:sticky;top:0;z-index:2}
h1{font-size:18px;margin:0 0 6px}
.row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
button,select,input{font-size:16px;padding:8px;border-radius:8px;border:1px solid #555;background:#222;color:#eee}
button{background:#2b5;color:#061;font-weight:700}
button.stop{background:#833;color:#fff}
label{font-size:13px;color:#ddd;display:flex;gap:4px;align-items:center}
#wrap{position:relative;width:100vw;height:calc(100vh - 150px);min-height:360px}
canvas{display:block;width:100%;height:100%}
#info{padding:8px 12px;font-size:13px;background:#181818;line-height:1.45}
.small{color:#aaa;font-size:12px}
</style>
</head>
<body>
<header>
<h1>ギター撥音観察用 リアルタイム・スペクトログラム</h1>
<div class="row">
<button id="startBtn">マイク開始</button>
<button id="stopBtn" class="stop" disabled>停止</button>
<label>FFT
<select id="fftSize">
<option>8192</option>
<option>16384</option>
<option selected>32768</option>
</select>
</label>
<label>表示音域
<select id="band">
<option value="82.41,659.25" selected>E2〜E5（ギター基音）</option>
<option value="82.41,1318.51">E2〜E6（倍音少し含む）</option>
<option value="40,2000">40〜2000Hz</option>
</select>
</label>
<label>感度
<input id="sens" type="range" min="5" max="60" value="20">
</label>
</div>
<div class="small">横方向＝時間、縦方向＝周波数。赤い点は「急に増えた周波数」の候補です。</div>
</header>
<div id="wrap"><canvas id="spec"></canvas></div>
<div id="info">待機中</div>
<script>
let audioCtx, analyser, source, stream, rafId, prev=null;
const canvas=document.getElementById("spec");
const ctx=canvas.getContext("2d",{willReadFrequently:true});
const info=document.getElementById("info");

const noteFreqs=[
["E2",82.41],["F2",87.31],["F#2",92.50],["G2",98.00],["G#2",103.83],["A2",110.00],["A#2",116.54],["B2",123.47],
["C3",130.81],["C#3",138.59],["D3",146.83],["D#3",155.56],["E3",164.81],["F3",174.61],["F#3",185.00],["G3",196.00],["G#3",207.65],["A3",220.00],["A#3",233.08],["B3",246.94],
["C4",261.63],["C#4",277.18],["D4",293.66],["D#4",311.13],["E4",329.63],["F4",349.23],["F#4",369.99],["G4",392.00],["G#4",415.30],["A4",440.00],["A#4",466.16],["B4",493.88],
["C5",523.25],["C#5",554.37],["D5",587.33],["D#5",622.25],["E5",659.25]
];

function resize(){
 const dpr=window.devicePixelRatio||1;
 canvas.width=Math.floor(canvas.clientWidth*dpr);
 canvas.height=Math.floor(canvas.clientHeight*dpr);
}
window.addEventListener("resize",resize);
resize();

function hzToY(freq,minF,maxF,h){
 const a=Math.log(freq/minF)/Math.log(maxF/minF);
 return h-a*h;
}
function colorForDb(db){
 let v=Math.max(0,Math.min(1,(db+95)/75));
 let r=Math.floor(255*Math.max(0,(v-0.45)/0.55));
 let g=Math.floor(255*Math.min(1,v*1.25));
 let b=Math.floor(255*Math.max(0,1-v*1.35));
 return `rgb(${r},${g},${b})`;
}
async function start(){
 try{
  stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  analyser=audioCtx.createAnalyser();
  analyser.fftSize=Number(document.getElementById("fftSize").value);
  analyser.smoothingTimeConstant=0.0;
  analyser.minDecibels=-100;
  analyser.maxDecibels=-15;
  source=audioCtx.createMediaStreamSource(stream);
  source.connect(analyser);
  prev=new Float32Array(analyser.frequencyBinCount);
  prev.fill(-100);
  document.getElementById("startBtn").disabled=true;
  document.getElementById("stopBtn").disabled=false;
  loop();
 }catch(e){
  info.textContent="マイク開始に失敗: "+e.message+" ※HTTPSまたはlocalhostで開いてください。";
 }
}
function stop(){
 cancelAnimationFrame(rafId);
 if(stream) stream.getTracks().forEach(t=>t.stop());
 if(audioCtx) audioCtx.close();
 document.getElementById("startBtn").disabled=false;
 document.getElementById("stopBtn").disabled=true;
 info.textContent="停止しました";
}
function loop(){
 rafId=requestAnimationFrame(loop);
 const w=canvas.width,h=canvas.height;
 const band=document.getElementById("band").value.split(",").map(Number);
 const minF=band[0],maxF=band[1];
 const sens=Number(document.getElementById("sens").value);
 const data=new Float32Array(analyser.frequencyBinCount);
 analyser.getFloatFrequencyData(data);
 const img=ctx.getImageData(1,0,w-1,h);
 ctx.putImageData(img,0,0);
 ctx.fillStyle="#000";
 ctx.fillRect(w-1,0,1,h);
 const sr=audioCtx.sampleRate;
 const binHz=sr/analyser.fftSize;
 const x=w-1;
 let peaks=[];
 for(let i=1;i<data.length-1;i++){
  const f=i*binHz;
  if(f<minF||f>maxF) continue;
  const y=Math.round(hzToY(f,minF,maxF,h));
  const db=data[i];
  ctx.fillStyle=colorForDb(db);
  ctx.fillRect(x,y,1,2);
  const rise=db-prev[i];
  if(rise>sens && db>data[i-1] && db>data[i+1] && db>-75){
   peaks.push({f,db,rise});
  }
 }
 ctx.save();
 ctx.font=`${Math.max(10,Math.floor(11*(window.devicePixelRatio||1)))}px sans-serif`;
 ctx.textBaseline="middle";
 for(const nf of noteFreqs){
  const name=nf[0],f=nf[1];
  if(f<minF||f>maxF) continue;
  const y=hzToY(f,minF,maxF,h);
  ctx.fillStyle="rgba(255,255,255,0.12)";
  ctx.fillRect(0,y,w,1);
  if(x%25===0){
   ctx.fillStyle="rgba(255,255,255,0.65)";
   ctx.fillText(name,4,y);
  }
 }
 ctx.restore();
 peaks.sort((a,b)=>b.rise-a.rise);
 const top=peaks.slice(0,4);
 ctx.fillStyle="#ff4040";
 for(const p of top){
  const y=hzToY(p.f,minF,maxF,h);
  ctx.beginPath();
  ctx.arc(x-2,y,3*(window.devicePixelRatio||1),0,Math.PI*2);
  ctx.fill();
 }
 prev.set(data);
 let msg=`sampleRate=${sr}Hz / FFT=${analyser.fftSize} / 分解能=${binHz.toFixed(2)}Hz/bin / 表示=${minF.toFixed(1)}〜${maxF.toFixed(1)}Hz`;
 if(top.length) msg+="<br>立ち上がり候補: "+top.map(p=>`${p.f.toFixed(1)}Hz (${p.rise.toFixed(1)}dB増)`).join(" / ");
 info.innerHTML=msg;
}
document.getElementById("startBtn").addEventListener("click",start);
document.getElementById("stopBtn").addEventListener("click",stop);
document.getElementById("fftSize").addEventListener("change",()=>{if(analyser) analyser.fftSize=Number(document.getElementById("fftSize").value);});
</script>
</body>
</html>
